<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Transporte - Julio Forero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">Logística de Transporte - Proyecto Serverless</h2>
            </div>
            <div class="card-body">
                <form action="/" method="get" class="mb-4 d-flex">
                    <input type="text" name="search" class="form-control me-2" placeholder="Buscar por ORIGEN (Ej: CARTAGENA)">
                    <button type="submit" class="btn btn-success">Buscar</button>
                </form>
                
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Origen</th>
                            <th>Destino</th>
                            <th>Flete</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for doc in docs %}
                        <tr>
                            <td>{{ doc.FECHA }}</td>
                            <td>{{ doc.ORIGEN }}</td>
                            <td>{{ doc.DESTINO }}</td>
                            <td>{{ doc.FLETE if doc.FLETE else 'No disponible' }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
